# ============================================
# Event Ticket Booking System - Configuration
# ============================================
# Storage: File Handling (.txt files in /data/)
# No database required.

# Application Name
spring.application.name=Event Ticket Booking System

# Server Port
server.port=8080

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# File Storage Path (relative to project root)
app.data.directory=data

# Logging
logging.level.com.event=DEBUG
