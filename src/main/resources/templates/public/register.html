<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Register - EventTix')}"></head>
<style>
.form-section-title { font-size: 0.9rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 1rem; margin-top: 1.5rem; border-bottom: 1px solid var(--border-light); padding-bottom: 0.5rem; }
</style>
<body>
<nav th:replace="~{fragments/header :: navbar}"></nav>
<section class="auth-section">
<div class="container">
<div class="row justify-content-center">
<div class="col-md-7 col-lg-6">
<div class="auth-card" style="padding: 2.5rem;">
    <div class="auth-header text-center mb-4">
        <i class="bi bi-person-plus auth-icon mb-3" style="font-size: 2.5rem; color: var(--primary);"></i>
        <h2 class="fw-bold">Create Account</h2>
        <p class="text-muted">Join EventTix and start booking events</p>
    </div>
    <div th:if="${error}" class="alert alert-danger"><i class="bi bi-exclamation-triangle-fill"></i> <span th:text="${error}"></span></div>
    
    </div>
</div>
</div>
</div>
</section>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/footer :: scripts}"></div>
</body>
</html>
