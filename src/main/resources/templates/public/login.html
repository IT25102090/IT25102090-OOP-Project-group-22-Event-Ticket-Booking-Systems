<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Login - EventTix')}"></head>
<body>
<nav th:replace="~{fragments/header :: navbar}"></nav>
<section class="auth-section">
<div class="container">
<div class="row justify-content-center">
<div class="col-md-5">
<div class="auth-card">
    <div class="auth-header">
        <i class="bi bi-box-arrow-in-right auth-icon"></i>
        <h2>Welcome Back</h2>
        <p>Sign in to your account</p>
    </div>
    <div th:if="${success}" class="alert alert-success"><i class="bi bi-check-circle-fill"></i> <span th:text="${success}"></span></div>
    <div th:if="${error}" class="alert alert-danger"><i class="bi bi-exclamation-triangle-fill"></i> <span th:text="${error}"></span></div>
    <form th:action="@{/user/login}" method="post" id="loginForm">
        <div class="mb-3">
            <label for="email" class="form-label">Email Address</label>
            <div class="input-group"><span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" class="form-control" id="email" name="email" required placeholder="you@example.com"></div>
        </div>
        <div class="mb-4">
            <label for="password" class="form-label">Password</label>
            <div class="input-group"><span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" class="form-control" id="password" name="password" required placeholder="••••••••"></div>
        </div>
        <button type="submit" class="btn btn-primary w-100 btn-lg"><i class="bi bi-box-arrow-in-right"></i> Sign In</button>
    </form>
    <div class="auth-footer"><p>Don't have an account? <a th:href="@{/user/register}">Create one</a></p></div>
    <div class="text-center mt-3">
        <a th:href="@{/admin/login}" style="font-size:0.82rem; color:#64748B; text-decoration:none;">
            <i class="bi bi-shield-lock"></i> Are you an Admin? <strong style="color:#10B981;">Admin Login →</strong>
        </a>
    </div>
</div>
</div></div></div>
</section>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/footer :: scripts}"></div>
</body>
</html>
