<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Error - EventTix')}"></head>
<body>
<nav th:replace="~{fragments/header :: navbar}"></nav>

<section style="min-height:65vh;display:flex;align-items:center;justify-content:center;padding:4rem 0;background:#F8FAFC;">
    <div class="container" style="text-align:center;">
        <div style="max-width:520px;margin:0 auto;">
            <div style="width:80px;height:80px;margin:0 auto 1.5rem;border-radius:50%;background:linear-gradient(135deg,#FEF3C7,#FDE68A);display:flex;align-items:center;justify-content:center;">
                <i class="bi bi-exclamation-triangle" style="font-size:2rem;color:#F59E0B;"></i>
            </div>
            <h1 style="font-size:1.75rem;font-weight:800;color:#0F172A;margin-bottom:0.75rem;">Oops! Something went wrong</h1>
            <p style="color:#64748B;font-size:1.05rem;line-height:1.7;margin-bottom:2rem;">The page you requested could not be loaded. Please try again.</p>
            <a th:href="@{/}" style="display:inline-flex;align-items:center;gap:0.5rem;padding:0.8rem 1.75rem;border-radius:12px;background:linear-gradient(135deg,#6366F1,#8B5CF6);color:#fff;text-decoration:none;font-weight:700;font-size:0.95rem;">
                <i class="bi bi-house"></i> Go Home
            </a>
        </div>
    </div>
</section>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/footer :: scripts}"></div>

</html>
