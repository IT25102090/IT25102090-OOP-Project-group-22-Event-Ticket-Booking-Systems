<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('My Profile - EventTix')}"></head>
<body>
<link rel="stylesheet" th:href="@{/css/profile.css}">
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="pg">
  <div th:if="${success}" class="alert alert-success alert-dismissible fade show mb-3" style="font-size:.82rem;border-radius:12px;"><i class="bi bi-check-circle-fill"></i> <span th:text="${success}"></span><button type="button" class="btn-close btn-sm" data-bs-dismiss="alert"></button></div>
  <div th:if="${error}" class="alert alert-danger alert-dismissible fade show mb-3" style="font-size:.82rem;border-radius:12px;"><i class="bi bi-exclamation-triangle-fill"></i> <span th:text="${error}"></span><button type="button" class="btn-close btn-sm" data-bs-dismiss="alert"></button></div>

  <div class="profile-cover">
    <div class="cover-pattern"></div>
    <div class="cover-actions">
      <button class="cover-btn" onclick="toggleEdit()"><i class="bi bi-pencil-fill"></i> Edit Profile</button>
      <a th:href="@{/events}" class="cover-btn" style="text-decoration:none;"><i class="bi bi-calendar-event-fill"></i> Browse Events</a>
    </div>
  </div>

  <div class="profile-header-card">
    <div class="phc-top">
      <div class="profile-avatar-wrap">
        <div class="profile-avatar" style="overflow: hidden; position: relative;">
          <img th:src="@{'/uploads/profiles/' + ${user.id} + '.jpg'}" 
               onerror="this.onerror=null; this.style.display='none'; this.nextElementSibling.style.display='flex';" 
               style="width: 100%; height: 100%; object-fit: cover; display: block;" alt="Profile Photo" />
          <span style="display: none; width: 100%; height: 100%; align-items: center; justify-content: center;" th:text="${#strings.substring(user.name,0,1).toUpperCase()}">U</span>
        </div>
        <div class="avatar-status"></div>
      </div>
      <div class="phc-info">
        <h1 th:text="${user.name}">User Name</h1>
        <p class="phc-email" th:text="${user.email}">email@test.com</p>
        <div class="phc-badges">
          <span class="badge-pill badge-role"><i class="bi bi-person-fill"></i> Member</span>
          <span th:if="${user.isPremium()}" class="badge-pill" style="background:#FEF3C7;color:#92400E;border:1px solid #FDE68A;"><i class="bi bi-gem"></i> Premium</span>
          <span th:if="${!user.isPremium()}" class="badge-pill" style="background:#F3F4F6;color:#6B7280;"><i class="bi bi-person-check"></i> Free</span>
          <span class="badge-pill badge-active"><i class="bi bi-circle-fill" style="font-size:.3rem;"></i> Active</span>
          <span class="badge-pill badge-id" th:text="'#' + ${user.id}">ID</span>
        </div>
      </div>
    </div>
    <div class="phc-stats-bar">
      <div class="phc-stat"><span class="phc-stat-icon" style="color:#6366f1;"><i class="bi bi-calendar-check-fill"></i></span><div class="phc-stat-num" th:text="${totalBookings}">0</div><div class="phc-stat-label">Bookings</div></div>
      <div class="phc-stat"><span class="phc-stat-icon" style="color:#10b981;"><i class="bi bi-check-circle-fill"></i></span><div class="phc-stat-num" th:text="${confirmedBookings}">0</div><div class="phc-stat-label">Confirmed</div></div>
      <div class="phc-stat"><span class="phc-stat-icon" style="color:#f59e0b;"><i class="bi bi-ticket-detailed-fill"></i></span><div class="phc-stat-num" th:text="${totalTickets}">0</div><div class="phc-stat-label">Tickets</div></div>
      <div class="phc-stat"><span class="phc-stat-icon" style="color:#8b5cf6;"><i class="bi bi-cash-stack"></i></span><div class="phc-stat-num" style="font-size:1.1rem;">LKR <span th:text="${#numbers.formatInteger(totalSpent,1,'COMMA')}">0</span></div><div class="phc-stat-label">Total Spent</div></div>
    </div>
  </div>

  </div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/footer :: scripts}"></div>
<script>
function toggleEdit(){var v=document.getElementById('viewMode'),e=document.getElementById('editForm');v.classList.toggle('hide');e.classList.toggle('show');}
</script>
</body>
</html>
